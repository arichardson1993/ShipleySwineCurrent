name: Deploy to GoDaddy Plesk

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git branch, tag, or commit SHA to deploy
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: plesk-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: windows-latest
    environment: production
    env:
      PLESK_USERNAME: ${{ secrets.PLESK_USERNAME }}
      PLESK_PASSWORD: ${{ secrets.PLESK_PASSWORD }}
      TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_ref }}

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore .\ShipleySwine.sln -NonInteractive

      - name: Validate deployment credentials
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PLESK_USERNAME) -or
              [string]::IsNullOrWhiteSpace($env:PLESK_PASSWORD)) {
            throw "Add PLESK_USERNAME and PLESK_PASSWORD as GitHub production environment secrets."
          }

      - name: Create Turnstile production configuration
        shell: pwsh
        run: |
          $hasSiteKey = -not [string]::IsNullOrWhiteSpace($env:TURNSTILE_SITE_KEY)
          $hasSecretKey = -not [string]::IsNullOrWhiteSpace($env:TURNSTILE_SECRET_KEY)

          if (-not $hasSiteKey -and -not $hasSecretKey) {
            Write-Host "Turnstile secrets are not configured; Turnstile will remain disabled."
            exit 0
          }

          if (-not $hasSiteKey -or -not $hasSecretKey) {
            throw "Add both TURNSTILE_SITE_KEY and TURNSTILE_SECRET_KEY to the production environment."
          }

          $siteKey = [System.Security.SecurityElement]::Escape($env:TURNSTILE_SITE_KEY)
          $secretKey = [System.Security.SecurityElement]::Escape($env:TURNSTILE_SECRET_KEY)
          $config = @"
          <appSettings>
            <add key="TurnstileSiteKey" value="$siteKey" />
            <add key="TurnstileSecretKey" value="$secretKey" />
          </appSettings>
          "@

          [IO.File]::WriteAllText(
            "$PWD\ShipleySwine\App_Data\turnstile.config",
            $config,
            [Text.UTF8Encoding]::new($false))

      - name: Build deployment package
        shell: pwsh
        run: |
          msbuild .\ShipleySwine\ShipleySwine.csproj `
            /m `
            /p:Configuration=Release `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=Package `
            /p:PackageAsSingleFile=true `
            /p:DeployIisAppPath="shipleyswine.com" `
            /p:EnableMSDeployAppOffline=true `
            /p:MSDeployUseChecksum=true `
            /p:SkipExtraFilesOnServer=true

      - name: Verify deployment package contents
        shell: pwsh
        run: |
          $packageRoot = "$PWD\ShipleySwine\obj\Release\Package\PackageTmp"
          $boarVideos = "$packageRoot\Views\Boars\BoarVideos.cshtml"
          $contactView = "$packageRoot\Views\Home\Contact.cshtml"
          $turnstileConfig = "$packageRoot\App_Data\turnstile.config"
          $applicationDll = "$packageRoot\bin\ShipleySwine.dll"

          if (-not (Test-Path -LiteralPath $boarVideos) -or
              -not (Select-String -LiteralPath $boarVideos -SimpleMatch "BwUTgfIqATo" -Quiet)) {
            throw "The deployment package does not contain the updated boar videos view."
          }

          if (-not (Test-Path -LiteralPath $contactView) -or
              -not (Select-String -LiteralPath $contactView -SimpleMatch "cf-turnstile" -Quiet)) {
            throw "The deployment package does not contain the Turnstile contact view."
          }

          if (-not (Test-Path -LiteralPath $turnstileConfig)) {
            throw "The deployment package does not contain the generated Turnstile configuration."
          }

          if (-not (Test-Path -LiteralPath $applicationDll)) {
            throw "The deployment package does not contain ShipleySwine.dll."
          }

      - name: Deploy package to Plesk
        shell: pwsh
        run: |
          $packagePath = "$PWD\ShipleySwine\obj\Release\Package\ShipleySwine.zip"
          $setParametersPath = "$PWD\ShipleySwine\obj\Release\Package\ShipleySwine.SetParameters.xml"
          $pleskServer = "a2nwvpweb032.shr.prod.iad2.secureserver.net"
          $msDeploy = @(
            "$env:ProgramFiles\IIS\Microsoft Web Deploy V3\msdeploy.exe",
            "${env:ProgramFiles(x86)}\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          ) | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1

          if (-not (Test-Path -LiteralPath $packagePath)) {
            throw "MSBuild did not create the Web Deploy package."
          }

          if (-not (Test-Path -LiteralPath $setParametersPath)) {
            throw "MSBuild did not create the Web Deploy parameter file."
          }

          if ([string]::IsNullOrWhiteSpace($msDeploy)) {
            throw "msdeploy.exe is not installed on the GitHub runner."
          }

          $env:MSDeployPath = "$(Split-Path -Parent $msDeploy)\"

          & $msDeploy `
            "-source:package=$packagePath" `
            "-dest:auto,computerName=https://${pleskServer}:8172/msdeploy.axd?site=shipleyswine.com,userName=$env:PLESK_USERNAME,password=$env:PLESK_PASSWORD,authtype=Basic,includeAcls=False" `
            "-verb:sync" `
            "-disableLink:AppPoolExtension" `
            "-disableLink:ContentExtension" `
            "-disableLink:CertificateExtension" `
            "-setParamFile:$setParametersPath" `
            "-enableRule:AppOffline" `
            "-enableRule:DoNotDeleteRule" `
            "-useChecksum"

          if ($LASTEXITCODE -ne 0) {
            throw "Web Deploy failed with exit code $LASTEXITCODE."
          }

      - name: Verify live site
        shell: pwsh
        run: |
          $healthUrl = "https://shipleyswine.com/Home/Contact?deploymentCheck=${{ github.run_id }}"
          $deployedCommit = git rev-parse HEAD

          for ($attempt = 1; $attempt -le 6; $attempt++) {
            $statusCode = & curl.exe `
              --fail `
              --silent `
              --show-error `
              --location `
              --max-time 20 `
              --output NUL `
              --write-out "%{http_code}" `
              $healthUrl

            if ($LASTEXITCODE -eq 0 -and $statusCode -eq "200") {
              Write-Host "Live-site health check passed for commit $deployedCommit."
              exit 0
            }

            Write-Warning "Health check attempt $attempt returned HTTP $statusCode."

            Start-Sleep -Seconds 10
          }

          throw "Deployment completed, but the live-site health check failed. Redeploy the previous known-good commit SHA."
