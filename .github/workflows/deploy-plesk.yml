name: Deploy to GoDaddy Plesk

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git branch, tag, or commit SHA to deploy
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: plesk-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: windows-latest
    environment: production
    env:
      PLESK_USERNAME: ${{ secrets.PLESK_USERNAME }}
      PLESK_PASSWORD: ${{ secrets.PLESK_PASSWORD }}
      TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_ref }}

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore .\ShipleySwine.sln -NonInteractive

      - name: Validate deployment credentials
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PLESK_USERNAME) -or
              [string]::IsNullOrWhiteSpace($env:PLESK_PASSWORD)) {
            throw "Add PLESK_USERNAME and PLESK_PASSWORD as GitHub production environment secrets."
          }

      - name: Create Turnstile production configuration
        shell: pwsh
        run: |
          $hasSiteKey = -not [string]::IsNullOrWhiteSpace($env:TURNSTILE_SITE_KEY)
          $hasSecretKey = -not [string]::IsNullOrWhiteSpace($env:TURNSTILE_SECRET_KEY)

          if (-not $hasSiteKey -and -not $hasSecretKey) {
            Write-Host "Turnstile secrets are not configured; Turnstile will remain disabled."
            exit 0
          }

          if (-not $hasSiteKey -or -not $hasSecretKey) {
            throw "Add both TURNSTILE_SITE_KEY and TURNSTILE_SECRET_KEY to the production environment."
          }

          $siteKey = [System.Security.SecurityElement]::Escape($env:TURNSTILE_SITE_KEY)
          $secretKey = [System.Security.SecurityElement]::Escape($env:TURNSTILE_SECRET_KEY)
          $config = @"
          <appSettings>
            <add key="TurnstileSiteKey" value="$siteKey" />
            <add key="TurnstileSecretKey" value="$secretKey" />
          </appSettings>
          "@

          [IO.File]::WriteAllText(
            "$PWD\ShipleySwine\App_Data\turnstile.config",
            $config,
            [Text.UTF8Encoding]::new($false))

      - name: Build and deploy to Plesk
        shell: pwsh
        run: |
          msbuild .\ShipleySwine\ShipleySwine.csproj `
            /m `
            /p:Configuration=Release `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=MSDeploy `
            /p:MSDeployServiceURL="https://shipleyswine.com:8172/msdeploy.axd?site=shipleyswine.com" `
            /p:DeployIisAppPath="shipleyswine.com" `
            /p:UserName="$env:PLESK_USERNAME" `
            /p:Password="$env:PLESK_PASSWORD" `
            /p:AuthType=Basic `
            /p:AllowUntrustedCertificate=false `
            /p:EnableMSDeployAppOffline=true `
            /p:MSDeployUseChecksum=true `
            /p:SkipExtraFilesOnServer=true

      - name: Verify live site
        shell: pwsh
        run: |
          $healthUrl = "https://shipleyswine.com/Home/Contact?deploymentCheck=${{ github.run_id }}"
          $deployedCommit = git rev-parse HEAD

          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              $response = Invoke-WebRequest `
                -Uri $healthUrl `
                -UseBasicParsing `
                -MaximumRedirection 5 `
                -TimeoutSec 20

              if ($response.StatusCode -eq 200) {
                Write-Host "Live-site health check passed for commit $deployedCommit."
                exit 0
              }
            }
            catch {
              Write-Warning "Health check attempt $attempt failed: $($_.Exception.Message)"
            }

            Start-Sleep -Seconds 10
          }

          throw "Deployment completed, but the live-site health check failed. Redeploy the previous known-good commit SHA."
